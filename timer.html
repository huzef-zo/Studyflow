<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="StudyFlow - Pomodoro Timer">
  <meta name="theme-color" content="#030712">
  <title>Timer - StudyFlow</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Navigation Containers -->
  <div id="sidebar-container"></div>
  <div id="bottom-nav-container"></div>

  <!-- Main Content -->
  <main class="main-container">
    <!-- Page Header -->
    <header class="page-header">
      <h1>Pomodoro Timer</h1>
      <p class="subtitle">Stay focused and productive</p>
    </header>

    <!-- Task Selection -->
    <div id="task-selection-container" style="max-width: 400px; margin: 0 auto var(--spacing-lg);">
      <div class="form-group">
        <label class="form-label" for="timer-task">Working on Task:</label>
        <select class="form-select" id="timer-task">
          <option value="">General Study</option>
          <!-- Populated by JS -->
        </select>
      </div>
      <div class="form-group hidden" id="subtask-selection-container">
        <label class="form-label" for="timer-subtask">Specific Sub-task:</label>
        <select class="form-select" id="timer-subtask">
          <option value="">Whole Task / None</option>
          <!-- Populated by JS -->
        </select>
      </div>
      <div id="timer-subtask-tracker" class="mt-sm hidden"></div>
    </div>

    <!-- Timer Container -->
    <div class="timer-container">
      <div class="timer-ring" id="timer-ring">
        <svg viewBox="0 0 300 300">
          <!-- Background circle -->
          <circle 
            class="timer-ring-bg" 
            cx="150" 
            cy="150" 
            r="140"
          />
          <!-- Progress circle -->
          <circle 
            id="timer-progress"
            class="timer-ring-progress" 
            cx="150" 
            cy="150" 
            r="140"
          />
        </svg>
        <div class="timer-display">
          <div class="timer-time" id="timer-time">25:00</div>
          <div class="timer-label" id="timer-label">Work Session</div>
        </div>
      </div>

      <!-- Timer Controls -->
      <div class="timer-controls">
        <button class="btn btn-secondary btn-lg" id="reset-btn" aria-label="Reset timer">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
          Reset
        </button>
        
        <button class="btn btn-primary btn-lg" id="start-btn" aria-label="Start timer">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          Start
        </button>
        
        <button class="btn btn-primary btn-lg hidden" id="pause-btn" aria-label="Pause timer">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
          Pause
        </button>
        
        <button class="btn btn-secondary btn-lg" id="skip-btn" aria-label="Skip to next session">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" x2="19" y1="5" y2="19"/></svg>
          Skip
        </button>
      </div>
    </div>

    <!-- Main Content Grid -->
    <div class="grid dashboard-layout mt-lg" style="gap: var(--spacing-lg);">
      <!-- Today's Stats -->
      <section class="card">
        <div class="card-header">
          <h3 class="card-title">Today's Stats</h3>
        </div>
        <div class="card-body">
          <div class="grid grid-3 grid-3-mobile">
            <div class="timer-stat">
              <div class="timer-stat-value" id="sessions-today">0</div>
              <div class="timer-stat-label">Sessions</div>
            </div>
            <div class="timer-stat">
              <div class="timer-stat-value" id="total-time-today">0m</div>
              <div class="timer-stat-label">Total Time</div>
            </div>
            <div class="timer-stat">
              <div class="timer-stat-value" id="session-count">0</div>
              <div class="timer-stat-label">This Streak</div>
            </div>
          </div>
        </div>
      </section>

      <!-- Recent Sessions -->
      <section class="card">
        <div class="card-header">
          <h3 class="card-title">Recent Sessions</h3>
        </div>
        <div class="card-body">
          <div id="recent-sessions-list" class="deadline-list">
            <!-- Populated by JS -->
            <div class="empty-state" style="padding: 1rem;">
              <p class="text-secondary text-center">No sessions recorded yet</p>
            </div>
          </div>
        </div>
      </section>
    </div>

    <!-- Keyboard Shortcuts -->
    <section class="card mt-lg">
      <div class="card-header">
        <h3 class="card-title">Keyboard Shortcuts</h3>
      </div>
      <div class="card-body">
        <div class="flex flex-wrap gap-lg">
          <div class="flex items-center gap-sm">
            <kbd class="badge" style="font-family: monospace; padding: 0.25rem 0.5rem;">Space</kbd>
            <span class="text-secondary">Start/Pause</span>
          </div>
          <div class="flex items-center gap-sm">
            <kbd class="badge" style="font-family: monospace; padding: 0.25rem 0.5rem;">R</kbd>
            <span class="text-secondary">Reset</span>
          </div>
          <div class="flex items-center gap-sm">
            <kbd class="badge" style="font-family: monospace; padding: 0.25rem 0.5rem;">S</kbd>
            <span class="text-secondary">Skip</span>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Scripts -->
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script src="js/timer.js"></script>
  <script>
    // Initialize timer page
    document.addEventListener('DOMContentLoaded', Timer.init);
  </script>
</body>
</html>
