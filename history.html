<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="StudyFlow - History and Progress Tracking">
  <meta name="theme-color" content="#030712">
  <title>History - StudyFlow</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Navigation Containers -->
  <div id="sidebar-container"></div>
  <div id="bottom-nav-container"></div>

  <!-- Main Content -->
  <main class="main-container">
    <!-- Page Header -->
    <header class="page-header">
      <div class="flex items-center justify-between flex-wrap gap-md">
        <div>
          <h1>History</h1>
          <p class="subtitle">Track your long-term progress and activity</p>
        </div>
      </div>
    </header>

    <!-- Activity Heat Map -->
    <section class="card mb-lg">
      <div class="card-header">
        <h3 class="card-title">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><line x1="3" x2="21" y1="9" y2="9"/><line x1="3" x2="21" y1="15" y2="15"/><line x1="9" x2="9" y1="3" y2="21"/><line x1="15" x2="15" y1="3" y2="21"/></svg>
          Activity Heat Map
        </h3>
      </div>
      <div class="card-body">
        <div class="heatmap-scroll-container">
          <div class="heatmap-wrapper">
            <div id="heatmap-grid" class="heatmap-grid">
              <!-- Populated by JS -->
            </div>
            <div class="heatmap-legend">
              <span>Less</span>
              <div class="heatmap-legend-day level-0"></div>
              <div class="heatmap-legend-day level-1"></div>
              <div class="heatmap-legend-day level-2"></div>
              <div class="heatmap-legend-day level-3"></div>
              <div class="heatmap-legend-day level-4"></div>
              <span>More</span>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Activity Frequency Graph -->
    <section class="card">
      <div class="card-header">
        <h3 class="card-title">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m7 16 3-3 3 3 5-5"/></svg>
          Activity Frequency (Last 30 Days)
        </h3>
      </div>
      <div class="card-body">
        <div class="frequency-scroll-container" style="overflow-x: auto; padding-bottom: var(--spacing-xl);">
          <div id="frequency-graph" class="frequency-graph">
            <!-- Populated by JS -->
          </div>
        </div>
      </div>
    </section>

    <!-- Stats Summary -->
    <section class="grid grid-3 mt-lg">
      <div class="stat-card">
        <div class="stat-value" id="total-completed-tasks">0</div>
        <div class="stat-label">Total Completed Tasks</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="total-study-hours">0h</div>
        <div class="stat-label">Total Study Time</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="all-time-streak">0</div>
        <div class="stat-label">Current Streak</div>
      </div>
    </section>
  </main>

  <!-- Scripts -->
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script src="js/history.js"></script>
  <script>
    // Initialize history page
    document.addEventListener('DOMContentLoaded', History.init);
  </script>
</body>
</html>
