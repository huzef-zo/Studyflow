<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <meta name="description" content="StudyFlow - Analytics and Progress Tracking">
  <meta name="theme-color" content="#0B0F19" media="(prefers-color-scheme: dark)">
  <meta name="color-scheme" content="dark">
  
  <!-- Standalone PWA Configuration -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="StudyFlow">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-touch-fullscreen" content="yes">
  
  <!-- Icons and Manifest -->
  <link rel="icon" type="image/png" href="./icon-192.png">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <link rel="manifest" href="./manifest.json">
  <link rel="msapplication-config" href="browserconfig.xml">
  <meta name="msapplication-TileColor" content="#3B82F6">
  
  <title>Analytics - StudyFlow</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Navigation Containers -->
  <div id="sidebar-container"></div>
  <div id="bottom-nav-container"></div>

  <!-- Main Content -->
  <main class="main-container">
    <!-- Page Header -->
    <header class="page-header animate-fade-in">
      <h1 class="glowing-text">Performance Analytics</h1>
      <p class="subtitle" style="font-weight: 500;">In-depth intelligence on your study patterns</p>
    </header>

    <div class="narrow-layout">
      <!-- Activity Frequency Graph -->
      <section class="card animate-fade-in stagger-1">
        <div class="card-header">
          <h3 class="card-title">Timeline Activity</h3>
        </div>
        <div class="card-body">
          <div id="frequency-graph" style="height: 200px; width: 100%;">
            <!-- Populated by JS -->
          </div>
        </div>
      </section>

      <!-- Stats Summary -->
      <section class="grid-2-dense animate-fade-in stagger-2">
        <div class="stat-pill" style="border-radius: var(--radius-lg); flex-direction: column; justify-content: center; align-items: center; text-align: center;">
          <div class="stat-pill-value gradient-text" id="total-completed-tasks" style="font-size: 2rem; font-weight: 800;">0</div>
          <div class="stat-pill-label">Total Missions</div>
        </div>
        <div class="stat-pill" style="border-radius: var(--radius-lg); flex-direction: column; justify-content: center; align-items: center; text-align: center;">
          <div class="stat-pill-value gradient-text" id="total-study-hours" style="font-size: 2rem; font-weight: 800;">0H</div>
          <div class="stat-pill-label">Total Focus</div>
        </div>
        <div class="stat-pill" style="border-radius: var(--radius-lg); flex-direction: column; justify-content: center; align-items: center; text-align: center;">
          <div class="stat-pill-value gradient-text" id="completion-rate" style="font-size: 2rem; font-weight: 800;">0%</div>
          <div class="stat-pill-label">Success Rate</div>
        </div>
        <div class="stat-pill" style="border-radius: var(--radius-lg); flex-direction: column; justify-content: center; align-items: center; text-align: center;">
          <div class="stat-pill-value" id="productive-day" style="font-size: 1.1rem; line-height: 1.1;">-</div>
          <div class="stat-pill-label">Peak Day</div>
        </div>
        <div class="stat-pill" style="border-radius: var(--radius-lg); flex-direction: column; justify-content: center; align-items: center; text-align: center;">
          <div class="stat-pill-value gradient-text" id="all-time-streak" style="font-size: 2rem; font-weight: 800;">0</div>
          <div class="stat-pill-label">Best Streak</div>
        </div>
      </section>

      <!-- Mastery Grid -->
      <section class="card animate-fade-in stagger-3">
        <div class="card-header">
          <h3 class="card-title">Sector Mastery</h3>
        </div>
        <div id="mastery-overview" style="display: grid; gap: 1rem;">
          <!-- Populated by JS -->
        </div>
      </section>

      <!-- Current Objectives -->
      <section class="card animate-fade-in stagger-4">
        <div class="card-header">
          <h3 class="card-title">Current Objectives</h3>
          <span class="badge" style="background: var(--success-glow); color: var(--success);" id="progress-percentage">0%</span>
        </div>
        <div id="tasks-progress"></div>
        <div id="hours-progress" class="mt-lg"></div>
      </section>
    </div>
  </main>

  <!-- Scripts -->
  <script src="js/storage.js"></script>
  <script src="js/pwa-manager.js"></script>
  <script src="js/app.js"></script>
  <script src="js/history.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', History.init);
  </script>
</body>
</html>
