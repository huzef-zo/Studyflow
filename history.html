<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="StudyFlow - Analytics and Progress Tracking">
  <meta name="theme-color" content="#030712">
  <title>Analytics - StudyFlow</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Navigation Containers -->
  <div id="sidebar-container"></div>
  <div id="bottom-nav-container"></div>

  <!-- Main Content -->
  <main class="main-container">
    <!-- Page Header -->
    <header class="page-header">
      <div class="flex items-center justify-between flex-wrap gap-md">
        <div>
          <h1>Analytics</h1>
          <p class="subtitle">Track your long-term progress and activity</p>
        </div>
      </div>
    </header>

    <div class="narrow-layout">
      <!-- Stats Summary -->
      <section class="flex flex-col gap-md">
        <div class="stat-card primary">
          <div class="stat-value" id="total-completed-tasks">0</div>
          <div class="stat-label">Total Completed Tasks</div>
        </div>
        <div class="stat-card success">
          <div class="stat-value" id="total-study-hours">0h</div>
          <div class="stat-label">Total Study Time</div>
        </div>
        <div class="stat-card warning">
          <div class="stat-value" id="all-time-streak">0</div>
          <div class="stat-label">Current Streak</div>
        </div>
        <div class="stat-card info">
          <div class="stat-value" id="completion-rate">0%</div>
          <div class="stat-label">Completion Rate</div>
        </div>
        <div class="stat-card danger">
          <div class="stat-value" id="productive-day">-</div>
          <div class="stat-label">Most Productive Day</div>
        </div>
      </section>

      <!-- Activity Frequency Graph -->
      <section class="card">
        <div class="card-header">
          <h3 class="card-title">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m7 16 3-3 3 3 5-5"/></svg>
            Activity Frequency (Last 30 Days)
          </h3>
        </div>
        <div class="card-body">
          <div id="frequency-graph" class="frequency-graph">
            <!-- Populated by JS -->
          </div>
        </div>
      </section>

      <!-- Mastery Overview Card -->
      <section class="card">
        <div class="card-header">
          <h3 class="card-title">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
            Mastery Overview
          </h3>
        </div>
        <div class="card-body">
          <div id="mastery-overview" class="mastery-grid">
            <!-- Populated by JS -->
          </div>
        </div>
      </section>

      <!-- Weekly Progress Card -->
      <section class="card">
        <div class="card-header">
          <h3 class="card-title">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
            Weekly Progress
          </h3>
          <span class="badge badge-primary" id="progress-percentage">0%</span>
        </div>
        <div class="card-body">
          <div id="tasks-progress"></div>
          <div id="hours-progress" class="mt-md"></div>
        </div>
      </section>
    </div>
  </main>

  <!-- Scripts -->
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script src="js/history.js"></script>
  <script>
    // Initialize history page
    document.addEventListener('DOMContentLoaded', History.init);
  </script>
</body>
</html>
