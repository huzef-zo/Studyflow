<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <meta name="description" content="StudyFlow - Your personal study organizer and productivity hub">
  <meta name="theme-color" content="#0B0F19" media="(prefers-color-scheme: dark)">
  <meta name="color-scheme" content="dark">
  <meta name="supported-color-schemes" content="dark">
  
  <!-- Standalone PWA Configuration -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="StudyFlow">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-touch-fullscreen" content="yes">
  <meta name="web-app-capable" content="yes">
  
  <!-- Icons -->
  <link rel="icon" type="image/png" href="./icon-192.png">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="./icon-192.png">
  <link rel="shortcut icon" type="image/png" href="./icon-192.png">
  
  <!-- Manifest -->
  <link rel="manifest" href="./manifest.json">
  <link rel="msapplication-config" href="browserconfig.xml">
  <meta name="msapplication-TileColor" content="#3B82F6">
  
  <title>Dashboard - StudyFlow</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Global SVG Gradients -->
  <svg width="0" height="0" style="position:absolute;">
    <defs>
      <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#3B82F6" />
        <stop offset="100%" stop-color="#8B5CF6" />
      </linearGradient>
    </defs>
  </svg>

  <!-- Navigation Containers -->
  <div id="sidebar-container"></div>
  <div id="bottom-nav-container"></div>

  <!-- Main Content -->
  <main class="main-container">
    <!-- Page Header -->    <header class="page-header animate-fade-in">
      <h1 class="glowing-text" id="greeting">Good morning!</h1>
      <p class="subtitle" id="date-display"></p>
    </header>

    <!-- Stats Row (Glowing Pills) -->
    <section class="stats-pill-row animate-fade-in stagger-1">
      <div class="stat-pill glowing-pill">
        <div class="stat-pill-icon icon-glow-primary" style="color: var(--primary);"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></div>
        <div>
          <div class="data-number" style="font-size: 24px;" id="stat-today">0</div>
          <div class="stat-pill-label">Tasks Today</div>
        </div>
      </div>
      <div class="stat-pill glowing-pill">
        <div class="stat-pill-icon icon-glow-danger" style="color: var(--danger);"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
        <div>
          <div class="data-number" style="font-size: 24px;" id="stat-pending">0</div>
          <div class="stat-pill-label">Pending</div>
        </div>
      </div>
      <div class="stat-pill glowing-pill">
        <div class="stat-pill-icon icon-glow-success" style="color: var(--success);"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
        <div>
          <div class="data-number" style="font-size: 24px;" id="stat-week">0</div>
          <div class="stat-pill-label">Completed</div>
        </div>
      </div>
      <div class="stat-pill glowing-pill">
        <div class="stat-pill-icon icon-glow-secondary" style="color: var(--secondary);"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg></div>
        <div>
          <div class="data-number" style="font-size: 24px;" id="streak-count">0</div>
          <div class="stat-pill-label">Streak</div>
        </div>
      </div>
    </section>

    <!-- Bento Grid -->
    <div class="bento-grid">

      <!-- Mastery Overview (Wide Card) -->
      <section class="card animate-fade-in stagger-2 col-span-3 md:col-span-2">
        <div class="flex items-center justify-between mb-lg">
          <h2 class="flex items-center gap-md" style="color: white;">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
            Mastery Overview
          </h2>
          <a href="settings.html" class="btn btn-secondary btn-sm" style="padding: 6px 12px; font-size: 11px;">Manage Subjects</a>
        </div>
        <div id="mastery-overview" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem;">          <!-- Populated by JS -->
        </div>
      </section>

      <!-- Upcoming Deadlines -->
      <section class="card animate-fade-in stagger-3 row-span-2">
        <div class="flex items-center justify-between mb-lg">
          <h2 class="flex items-center gap-md" style="color: white;">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--secondary)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
            Upcoming
          </h2>
          <a href="tasks.html" class="btn btn-secondary btn-sm" style="padding: 6px 12px; font-size: 11px;">View All</a>
        </div>
        <div id="deadlines-list" class="timeline">
          <!-- Populated by JS -->
        </div>
      </section>

      <!-- Weekly Progress -->
      <section class="card animate-fade-in stagger-4 col-span-2 md:col-span-2">
        <div class="flex items-center justify-between mb-lg">
          <h2 class="flex items-center gap-md" style="color: white;">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
            Weekly Progress
          </h2>
          <span class="badge" style="background: var(--success-glow); color: var(--success);" id="progress-percentage">0%</span>
        </div>
        <div id="tasks-progress" class="progress-container"></div>
        <div id="hours-progress" class="progress-container" style="margin-top: var(--spacing-md);"></div>
      </section>

      <!-- Quick Actions -->
      <section class="card animate-fade-in stagger-5">
        <h2 class="flex items-center gap-md mb-lg" style="color: white;">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
          Quick Actions
        </h2>
        <div class="flex flex-col gap-sm">
          <a href="tasks.html?action=add" class="btn btn-primary">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></svg>
            Add Task
          </a>
          <a href="timer.html" class="btn btn-secondary">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            Focus
          </a>
        </div>
      </section>

    </div>  </main>

  <!-- Scripts -->
  <script src="js/storage.js"></script>
  <script src="js/pwa-manager.js"></script>
  <script src="js/app.js"></script>
  <script>
    // ============================================
    // SERVICE WORKER REGISTRATION & PWA MANAGEMENT
    // ============================================
    (function() {
      'use strict';
      
      // Register service worker for offline functionality
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then((registration) => {
              console.log('[PWA] Service Worker registered:', registration);
              
              // Check for updates periodically
              setInterval(() => {
                registration.update();
              }, 60000); // Check every 60 seconds
              
              // Listen for controller change (new SW activated)
              navigator.serviceWorker.addEventListener('controllerchange', () => {
                console.log('[PWA] Service Worker controller changed - new version available');
                showUpdateNotification();
              });
            })
            .catch((error) => {
              console.error('[PWA] Service Worker registration failed:', error);
            });
        });
      }
      
      // Handle install prompt
      let deferredPrompt;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        console.log('[PWA] Install prompt deferred');
        // You could show an install button here
      });
      
      // Detect standalone mode
      const isStandalone = () => {
        return window.navigator.standalone === true || 
               window.matchMedia('(display-mode: standalone)').matches ||               window.matchMedia('(display-mode: fullscreen)').matches ||
               window.matchMedia('(display-mode: minimal-ui)').matches;
      };
      
      // Update UI based on standalone status
      if (isStandalone()) {
        document.documentElement.setAttribute('data-standalone', 'true');
        console.log('[PWA] Running in standalone mode');
      }
      
      // Handle visibility changes to optimize battery
      document.addEventListener('visibilitychange', () => {
        if (document.hidden) {
          console.log('[PWA] App hidden - pausing animations');
        } else {
          console.log('[PWA] App visible - resuming animations');
        }
      });
      
      // Show update notification
      function showUpdateNotification() {
        // You can customize this based on your UI
        console.log('[PWA] New version available - consider showing update prompt');
      }
      
      // Expose PWA utilities to window
      window.PWA = {
        isStandalone,
        requestInstall: () => {
          if (deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then((choiceResult) => {
              if (choiceResult.outcome === 'accepted') {
                console.log('[PWA] User accepted install prompt');
              } else {
                console.log('[PWA] User dismissed install prompt');
              }
              deferredPrompt = null;
            });
          }
        },
        requestSync: () => {
          if ('serviceWorker' in navigator && 'SyncManager' in window) {
            navigator.serviceWorker.ready.then((registration) => {
              return registration.sync.register('sync-tasks');
            }).then(() => {
              console.log('[PWA] Background sync registered');
            }).catch((error) => {
              console.error('[PWA] Background sync registration failed:', error);
            });          }
        },
        requestNotificationPermission: () => {
          if ('Notification' in window) {
            Notification.requestPermission().then((permission) => {
              console.log('[PWA] Notification permission:', permission);
            });
          }
        }
      };
    })();
    
    // ============================================
    // DASHBOARD SPECIFIC CODE
    // ============================================
    (function() {
      'use strict';

      function updateGreeting() {
        const hour = new Date().getHours();
        const greetingEl = document.getElementById('greeting');
        const user = Storage.getUser();
        let greeting = hour < 12 ? 'Good morning' : (hour < 18 ? 'Good afternoon' : 'Good evening');
        greetingEl.textContent = `${greeting}, ${user.name}!`;
      }

      function updateDateDisplay() {
        const dateEl = document.getElementById('date-display');
        const options = { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' };
        dateEl.textContent = new Date().toLocaleDateString('en-US', options);
      }

      function updateStats() {
        const stats = Storage.getStats();
        document.getElementById('stat-today').textContent = stats.tasks.today;
        document.getElementById('stat-pending').textContent = stats.tasks.pending;
        document.getElementById('stat-week').textContent = stats.tasks.weekCompleted;
        document.getElementById('streak-count').textContent = stats.streak;
      }

      function updateProgress() {
        const goals = Storage.getGoals();
        const stats = Storage.getStats();
        
        const tasksPercentage = goals.weekly_tasks > 0 ? Math.round((goals.current_tasks / goals.weekly_tasks) * 100) : 0;
        document.getElementById('tasks-progress').innerHTML = createGlowingProgressBar(goals.current_tasks, goals.weekly_tasks, 'Missions', '#3B82F6');
        
        const currentHours = Math.round(goals.current_hours * 10) / 10;
        document.getElementById('hours-progress').innerHTML = createGlowingProgressBar(currentHours, goals.weekly_hours, 'Focus Hours', '#8B5CF6');
                const hoursPercentage = goals.weekly_hours > 0 ? (goals.current_hours / goals.weekly_hours * 100) : 0;
        const avgPercentage = Math.round((tasksPercentage + hoursPercentage) / 2);
        document.getElementById('progress-percentage').textContent = `${Math.min(100, avgPercentage)}%`;
      }

      function createGlowingProgressBar(current, max, label, color) {
        const percentage = max > 0 ? Math.min(100, Math.round((current / max) * 100)) : 0;
        return `
          <div class="progress-header">
            <span class="progress-label">${label}</span>
            <span class="progress-percent" style="color: #FFFFFF;">${current} / ${max}</span>
          </div>
          <div class="progress-bar-bg">
            <div class="progress-bar-fill" style="width: ${percentage}%;"></div>
          </div>
        `;
      }

      function updateMasteryOverview() {
        const masteryEl = document.getElementById('mastery-overview');
        const stats = Storage.getSubjectMasteryStats();
        if (stats.length === 0) {
          masteryEl.innerHTML = '<div class="empty-state" style="padding: 1rem; grid-column: 1 / -1;"><p class="text-secondary text-center">No sectors defined</p></div>';
          return;
        }
        masteryEl.innerHTML = stats.map(subject => `
          <div class="mastery-item">
            <div class="flex items-center justify-between mb-sm">
              <span style="font-weight: 700; font-size: 0.875rem; color: white;">${App.escapeHtml(subject.name)}</span>
              <span style="font-weight: 800; color: white; font-size: 0.875rem;">${subject.percentage}%</span>
            </div>
            <div class="progress-bar-bg" style="height: 6px;">
              <div class="progress-bar-fill" style="width: ${subject.percentage}%;"></div>
            </div>
            <div style="font-size: 10px; color: rgba(255, 255, 255, 0.5); margin-top: 4px; font-weight: 600; text-transform: uppercase;">
              ${subject.completed} / ${subject.total} Objectives
            </div>
          </div>
        `).join('');
      }

      function updateDeadlines() {
        const deadlinesEl = document.getElementById('deadlines-list');
        const upcomingTasks = Storage.getUpcomingTasks(7);
        if (upcomingTasks.length === 0) {
          deadlinesEl.innerHTML = '<div class="empty-state" style="padding: 1rem;"><p class="text-secondary text-center">Clear timeline</p></div>';
          return;
        }
        deadlinesEl.innerHTML = upcomingTasks.slice(0, 5).map(task => `
          <div class="timeline-item">            <div class="timeline-dot" style="background: ${App.getSubjectColor(task.subject)}"></div>
            <div style="font-size: 11px; font-weight: 800; color: var(--primary); text-transform: uppercase;">${Storage.formatDisplayDate(task.dueDate)}</div>
            <div style="font-size: 14px; font-weight: 600; color: white;">${App.escapeHtml(task.title)}</div>
            <div style="font-size: 11px; color: var(--text-muted);">${App.escapeHtml(task.subject)}</div>
          </div>
        `).join('');
      }

      function init() {
        updateGreeting();
        updateDateDisplay();
        updateStats();
        updateProgress();
        updateMasteryOverview();
        updateDeadlines();
      }
      init();
    })();
  </script>
  </body>
  </html>
