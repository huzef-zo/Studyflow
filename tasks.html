<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <meta name="description" content="StudyFlow - Task Manager and study objectives tracker">
  <meta name="theme-color" content="#0B0F19" media="(prefers-color-scheme: dark)">
  <meta name="color-scheme" content="dark">
  
  <!-- Standalone PWA Configuration -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="StudyFlow">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-touch-fullscreen" content="yes">
  
  <!-- Icons and Manifest -->
  <link rel="icon" type="image/png" href="./icon-192.png">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <link rel="manifest" href="./manifest.json">
  <link rel="msapplication-config" href="browserconfig.xml">
  <meta name="msapplication-TileColor" content="#3B82F6">
  
  <title>Tasks - StudyFlow</title>
  <link rel="stylesheet" href="css/style.css?v=v2025-05-03-02">
  <style>
    /* Tasks page - filter bar is now handled globally */
  </style>
</head>
<body>
  <!-- Navigation Containers -->
  <div id="sidebar-container"></div>
  <div id="bottom-nav-container"></div>

  <!-- Main Content -->
  <main class="main-container">
    <!-- Page Header -->
    <header class="page-header animate-fade-in">
      <div class="flex items-center justify-between flex-wrap gap-md">
        <div>
          <h1 class="glowing-text">Mission Core</h1>
          <p class="subtitle" style="font-weight: 500;">Strategize and achieve your study targets</p>
        </div>
        <div class="flex items-center gap-sm flex-1" style="min-width: 250px;">
          <div class="form-group mb-0 flex-1">
            <input type="text" id="search-tasks" class="form-input glass-pill-input" placeholder="Search objectives..." style="padding: 8px 20px;" aria-label="Search objectives">
          </div>
          <button class="btn btn-primary" id="add-task-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></svg>
            New Objective
          </button>
        </div>
      </div>
    </header>

    <!-- Filter Bar -->
    <div class="flex flex-wrap items-center justify-between gap-md mb-sm animate-fade-in" style="animation-delay: 0.1s;">
      <div class="filter-tabs" style="margin: 0;" role="tablist" aria-label="Filter missions">
        <div class="filter-tab active" data-filter="all" role="tab" aria-selected="true" tabindex="0">All Missions</div>
        <div class="filter-tab" data-filter="pending" role="tab" aria-selected="false" tabindex="0">Active</div>
        <div class="filter-tab" data-filter="completed" role="tab" aria-selected="false" tabindex="0">Accomplished</div>
      </div>

      <div class="flex items-center gap-sm flex-wrap">
        <select id="filter-priority" class="form-input glass-pill-input" style="width: auto; padding: 8px 20px; min-width: 140px;" aria-label="Filter by priority">
          <option value="all">All Priorities</option>
          <option value="critical">Critical</option>
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
        <select id="filter-subject" class="form-input glass-pill-input" style="width: auto; padding: 8px 20px; min-width: 140px;" aria-label="Filter by subject">
          <option value="all">All Subjects</option>
          <!-- Populated by JS -->
        </select>
      </div>
    </div>

    <!-- Task List -->
    <section id="task-list" class="animate-fade-in" style="animation-delay: 0.2s;">
      <!-- Populated by JS -->
    </section>
  </main>

  <!-- Scripts -->
  <script src="js/storage.js?v=v2025-05-03-02"></script>
  <script src="js/subtask-utils.js?v=v2025-05-03-02"></script>
  <script src="js/pwa-manager.js?v=v2025-05-03-02"></script>
  <script src="js/achievements.js?v=v2025-05-03-02"></script>
  <script src="js/app.js?v=v2025-05-03-02"></script>
  <script src="js/tasks.js?v=v2025-05-03-02"></script>
  <script>
    // Initialize tasks page
    document.addEventListener('DOMContentLoaded', () => {
      PWAManager.init();
      Tasks.init();
    });
  </script>
</body>
</html>
