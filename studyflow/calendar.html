<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="StudyFlow - Calendar View">
  <meta name="theme-color" content="#030712">
  <title>Calendar - StudyFlow</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Navigation Containers -->
  <div id="sidebar-container"></div>
  <div id="bottom-nav-container"></div>

  <!-- Main Content -->
  <main class="main-container">
    <!-- Page Header -->
    <header class="page-header">
      <h1>Calendar</h1>
      <p class="subtitle">View and manage your tasks by date</p>
    </header>

    <!-- Calendar and Tasks Layout -->
    <div class="grid" style="grid-template-columns: 1fr; gap: var(--spacing-lg);">
      
      <!-- Calendar Card -->
      <section class="calendar-container">
        <div class="calendar-header">
          <h2 class="calendar-title" id="calendar-title">March 2026</h2>
          <div class="calendar-nav">
            <button class="btn btn-ghost btn-icon btn-sm" id="prev-month" aria-label="Previous month">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <button class="btn btn-secondary btn-sm" id="today-btn">Today</button>
            <button class="btn btn-ghost btn-icon btn-sm" id="next-month" aria-label="Next month">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
          </div>
        </div>
        <div class="calendar-grid" id="calendar-grid">
          <!-- Populated by JS -->
        </div>
      </section>

      <!-- Selected Day Tasks -->
      <section class="card">
        <div class="card-header">
          <h3 class="card-title" id="selected-date-title">Select a date</h3>
          <button class="btn btn-ghost btn-sm" id="add-task-btn" style="display: none;">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></svg>
            Add Task
          </button>
        </div>
        <div class="card-body" id="day-tasks">
          <!-- Populated by JS -->
        </div>
      </section>

    </div>

    <!-- Legend -->
    <section class="card mt-lg">
      <div class="card-header">
        <h3 class="card-title">Legend</h3>
      </div>
      <div class="card-body">
        <div class="flex flex-wrap gap-lg">
          <div class="flex items-center gap-sm">
            <div style="width: 12px; height: 12px; border-radius: 50%; background-color: var(--primary);"></div>
            <span class="text-secondary">Pending Task</span>
          </div>
          <div class="flex items-center gap-sm">
            <div style="width: 12px; height: 12px; border-radius: 50%; background-color: var(--success);"></div>
            <span class="text-secondary">Completed Task</span>
          </div>
          <div class="flex items-center gap-sm">
            <div style="width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--primary);"></div>
            <span class="text-secondary">Today</span>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Scripts -->
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script src="js/calendar.js"></script>
  <script>
    // Initialize calendar page
    document.addEventListener('DOMContentLoaded', Calendar.init);
  </script>
</body>
</html>
