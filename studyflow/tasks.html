<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="StudyFlow - Task Manager">
  <meta name="theme-color" content="#030712">
  <title>Tasks - StudyFlow</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Navigation Containers -->
  <div id="sidebar-container"></div>
  <div id="bottom-nav-container"></div>

  <!-- Main Content -->
  <main class="main-container">
    <!-- Page Header -->
    <header class="page-header">
      <div class="flex items-center justify-between flex-wrap gap-md">
        <div>
          <h1>Tasks</h1>
          <p class="subtitle">Manage your study tasks and assignments</p>
        </div>
        <button class="btn btn-primary" id="add-task-btn">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></svg>
          Add Task
        </button>
      </div>
    </header>

    <!-- Filter Bar -->
    <div class="filter-bar">
      <div class="search-input-wrapper">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" x2="16.65" y1="21" y2="16.65"/></svg>
        <input type="text" 
               class="form-input" 
               id="search-input" 
               placeholder="Search tasks..."
               aria-label="Search tasks">
      </div>
      
      <div class="filter-group">
        <select class="form-select" id="priority-filter" aria-label="Filter by priority">
          <option value="all">All Priorities</option>
          <option value="critical">Critical</option>
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
        
        <select class="form-select" id="subject-filter" aria-label="Filter by subject">
          <option value="all">All Subjects</option>
          <!-- Populated by JS -->
        </select>
      </div>
    </div>

    <!-- Status Tabs -->
    <div class="tabs">
      <button class="tab active" data-filter="all">All</button>
      <button class="tab" data-filter="pending">Pending</button>
      <button class="tab" data-filter="completed">Completed</button>
    </div>

    <!-- Task List -->
    <section class="task-list" id="task-list">
      <!-- Populated by JS -->
    </section>
  </main>

  <!-- Scripts -->
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script src="js/tasks.js"></script>
  <script>
    // Initialize tasks page
    document.addEventListener('DOMContentLoaded', Tasks.init);
  </script>
</body>
</html>
