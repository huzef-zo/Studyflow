<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="StudyFlow - Goals Tracking">
  <meta name="theme-color" content="#030712">
  <title>Goals - StudyFlow</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Goals page specific styles */
    .week-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: var(--spacing-sm);
      margin-bottom: var(--spacing-lg);
    }
    
    .week-day {
      text-align: center;
      padding: var(--spacing-sm);
      border-radius: var(--radius-md);
      background-color: var(--bg-tertiary);
    }
    
    .week-day.today {
      background-color: rgba(37, 99, 235, 0.2);
      border: 1px solid var(--primary);
    }
    
    .week-day-name {
      font-size: 0.625rem;
      color: var(--text-secondary);
      text-transform: uppercase;
    }
    
    .week-day-number {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text-primary);
    }
    
    .goal-card {
      background-color: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--spacing-lg);
      margin-bottom: var(--spacing-md);
    }
    
    .goal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--spacing-md);
    }
    
    .goal-title {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      font-weight: 600;
    }
    
    .goal-title svg {
      width: 20px;
      height: 20px;
      color: var(--primary);
    }
    
    .goal-stats {
      display: flex;
      align-items: baseline;
      gap: var(--spacing-xs);
      margin-bottom: var(--spacing-md);
    }
    
    .goal-value {
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1;
    }
    
    .goal-max {
      font-size: 1.25rem;
      color: var(--text-secondary);
    }
    
    .goal-progress-wrapper {
      margin-bottom: var(--spacing-sm);
    }
    
    .goal-progress-bar {
      height: 12px;
      background-color: var(--bg-tertiary);
      border-radius: var(--radius-full);
      overflow: hidden;
    }
    
    .goal-progress-fill {
      height: 100%;
      background-color: var(--primary);
      border-radius: var(--radius-full);
      transition: width var(--transition-slow);
    }
    
    .goal-progress-fill.complete {
      background-color: var(--success);
    }
    
    .goal-progress-info {
      display: flex;
      justify-content: space-between;
      margin-top: var(--spacing-xs);
    }
    
    .goal-progress-text {
      font-size: 0.75rem;
      color: var(--text-secondary);
    }
    
    .goal-progress-percent {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-primary);
    }
    
    /* Daily Progress Grid */
    .daily-progress-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: var(--spacing-sm);
    }
    
    @media (max-width: 479px) {
      .daily-progress-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }
    
    .daily-progress-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: var(--spacing-sm);
      border-radius: var(--radius-md);
      background-color: var(--bg-tertiary);
      transition: all var(--transition-fast);
    }
    
    .daily-progress-item.today {
      background-color: rgba(37, 99, 235, 0.15);
      border: 1px solid var(--primary);
    }
    
    .daily-progress-item.complete {
      background-color: rgba(34, 197, 94, 0.1);
    }
    
    .daily-progress-item.future {
      opacity: 0.5;
    }
    
    .daily-progress-circle {
      position: relative;
      width: 48px;
      height: 48px;
      margin-bottom: var(--spacing-xs);
    }
    
    .daily-progress-circle svg {
      width: 100%;
      height: 100%;
    }
    
    .daily-progress-value {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 0.625rem;
      font-weight: 600;
      color: var(--text-primary);
    }
    
    .daily-progress-label {
      font-size: 0.625rem;
      color: var(--text-secondary);
      text-align: center;
      line-height: 1.3;
    }
  </style>
</head>
<body>
  <!-- Navigation Containers -->
  <div id="sidebar-container"></div>
  <div id="bottom-nav-container"></div>

  <!-- Main Content -->
  <main class="main-container">
    <!-- Page Header -->
    <header class="page-header">
      <div class="flex items-center justify-between flex-wrap gap-md">
        <div>
          <h1>Weekly Goals</h1>
          <p class="subtitle">Track your progress and stay motivated</p>
        </div>
        <button class="btn btn-secondary" id="edit-goals-btn">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          Edit Goals
        </button>
      </div>
    </header>

    <!-- Week Display -->
    <section class="card mb-lg">
      <div class="card-header">
        <h3 class="card-title">This Week</h3>
      </div>
      <div class="card-body">
        <div class="week-days" id="week-dates">
          <!-- Populated by JS -->
        </div>
      </div>
    </section>

    <!-- Goals Cards -->
    <div class="grid" style="grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: var(--spacing-lg);">
      
      <!-- Tasks Goal -->
      <section class="goal-card">
        <div class="goal-header">
          <div class="goal-title">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
            Tasks Completed
          </div>
        </div>
        <div class="goal-stats">
          <span class="goal-value" id="tasks-goal-value">0</span>
          <span class="goal-max">/ <span id="tasks-goal-max">10</span></span>
        </div>
        <div class="goal-progress-wrapper">
          <div class="goal-progress-bar">
            <div class="goal-progress-fill" id="tasks-progress-bar" style="width: 0%"></div>
          </div>
          <div class="goal-progress-info">
            <span class="goal-progress-text">Weekly target</span>
            <span class="goal-progress-percent" id="tasks-percent">0%</span>
          </div>
        </div>
      </section>

      <!-- Study Hours Goal -->
      <section class="goal-card">
        <div class="goal-header">
          <div class="goal-title">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            Study Hours
          </div>
        </div>
        <div class="goal-stats">
          <span class="goal-value" id="hours-goal-value">0</span>
          <span class="goal-max">/ <span id="hours-goal-max">20</span>h</span>
        </div>
        <div class="goal-progress-wrapper">
          <div class="goal-progress-bar">
            <div class="goal-progress-fill" id="hours-progress-bar" style="width: 0%"></div>
          </div>
          <div class="goal-progress-info">
            <span class="goal-progress-text">Weekly target</span>
            <span class="goal-progress-percent" id="hours-percent">0%</span>
          </div>
        </div>
      </section>

    </div>

    <!-- Daily Progress -->
    <section class="card mt-lg">
      <div class="card-header">
        <h3 class="card-title">Daily Progress</h3>
      </div>
      <div class="card-body">
        <div class="daily-progress-grid" id="daily-progress">
          <!-- Populated by JS -->
        </div>
      </div>
    </section>

    <!-- Motivation -->
    <section class="card mt-lg">
      <div class="card-header">
        <h3 class="card-title">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>
          Keep Going!
        </h3>
      </div>
      <div class="card-body">
        <p class="text-secondary" id="motivation-message">
          Every task completed is a step towards your goals. Stay consistent and you'll see results!
        </p>
      </div>
    </section>
  </main>

  <!-- Scripts -->
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script src="js/goals.js"></script>
  <script>
    // Initialize goals page
    document.addEventListener('DOMContentLoaded', Goals.init);
  </script>
</body>
</html>
