<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="StudyFlow - Your personal study organizer">
  <meta name="theme-color" content="#030712">
  <title>Dashboard - StudyFlow</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Navigation Containers -->
  <div id="sidebar-container"></div>
  <div id="bottom-nav-container"></div>

  <!-- Main Content -->
  <main class="main-container">
    <!-- Page Header -->
    <header class="page-header">
      <h1 id="greeting">Good morning!</h1>
      <p class="subtitle" id="date-display"></p>
    </header>

    <!-- Stats Grid -->
    <section class="grid grid-4 mb-lg">
      <div class="stat-card primary">
        <div class="stat-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        </div>
        <div class="stat-value" id="stat-today">0</div>
        <div class="stat-label">Today's Tasks</div>
      </div>

      <div class="stat-card warning">
        <div class="stat-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </div>
        <div class="stat-value" id="stat-pending">0</div>
        <div class="stat-label">Pending Tasks</div>
      </div>

      <div class="stat-card success">
        <div class="stat-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div class="stat-value" id="stat-week">0</div>
        <div class="stat-label">Completed This Week</div>
      </div>

      <div class="stat-card danger">
        <div class="stat-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12.01" y1="8" y2="8"/><line x1="12" x2="12" y1="12" y2="16"/></svg>
        </div>
        <div class="stat-value" id="stat-overdue">0</div>
        <div class="stat-label">Overdue</div>
      </div>
    </section>

    <!-- Two Column Layout -->
    <div class="grid" style="grid-template-columns: 1fr; gap: var(--spacing-lg);">
      <div style="display: grid; gap: var(--spacing-lg);">
        
        <!-- Weekly Progress Card -->
        <section class="card">
          <div class="card-header">
            <h3 class="card-title">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
              Weekly Progress
            </h3>
            <span class="badge badge-primary" id="progress-percentage">0%</span>
          </div>
          <div class="card-body">
            <div id="tasks-progress"></div>
            <div id="hours-progress" class="mt-md"></div>
          </div>
        </section>

        <!-- Streak Card -->
        <section class="card">
          <div class="card-header">
            <h3 class="card-title">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>
              Current Streak
            </h3>
          </div>
          <div class="card-body">
            <div class="streak-display">
              <div class="streak-flame">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>
              </div>
              <div class="streak-info">
                <div class="streak-count" id="streak-count">0 days</div>
                <div class="streak-label">Keep it going!</div>
              </div>
            </div>
          </div>
        </section>

      </div>

      <div style="display: grid; gap: var(--spacing-lg);">
        
        <!-- Upcoming Deadlines -->
        <section class="card">
          <div class="card-header">
            <h3 class="card-title">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
              Upcoming Deadlines
            </h3>
            <a href="tasks.html" class="btn btn-ghost btn-sm">View All</a>
          </div>
          <div class="card-body">
            <div id="deadlines-list" class="deadline-list">
              <!-- Populated by JS -->
            </div>
          </div>
        </section>

        <!-- Quick Actions -->
        <section class="card">
          <div class="card-header">
            <h3 class="card-title">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
              Quick Actions
            </h3>
          </div>
          <div class="card-body">
            <div class="flex flex-wrap gap-sm">
              <a href="tasks.html?action=add" class="btn btn-primary">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></svg>
                Add Task
              </a>
              <a href="timer.html" class="btn btn-secondary">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                Start Timer
              </a>
              <a href="calendar.html" class="btn btn-secondary">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
                Calendar
              </a>
            </div>
          </div>
        </section>

        <!-- Today's Sessions -->
        <section class="card">
          <div class="card-header">
            <h3 class="card-title">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              Today's Study Time
            </h3>
            <a href="timer.html" class="btn btn-ghost btn-sm">Timer</a>
          </div>
          <div class="card-body">
            <div class="flex items-center gap-md">
              <div class="stat-value" style="font-size: 2rem;" id="today-time">0m</div>
              <div class="text-secondary">
                <span id="today-sessions">0</span> pomodoro sessions
              </div>
            </div>
          </div>
        </section>

      </div>
    </div>
  </main>

  <!-- Scripts -->
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script>
    // Dashboard specific code
    (function() {
      'use strict';

      /**
       * Update greeting based on time of day
       */
      function updateGreeting() {
        const hour = new Date().getHours();
        const greetingEl = document.getElementById('greeting');
        const user = Storage.getUser();
        
        let greeting;
        if (hour < 12) {
          greeting = 'Good morning';
        } else if (hour < 18) {
          greeting = 'Good afternoon';
        } else {
          greeting = 'Good evening';
        }
        
        greetingEl.textContent = `${greeting}, ${user.name}!`;
      }

      /**
       * Update date display
       */
      function updateDateDisplay() {
        const dateEl = document.getElementById('date-display');
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        dateEl.textContent = new Date().toLocaleDateString('en-US', options);
      }

      /**
       * Update statistics
       */
      function updateStats() {
        const stats = Storage.getStats();
        
        // Today's tasks
        document.getElementById('stat-today').textContent = stats.tasks.today;
        
        // Pending tasks
        document.getElementById('stat-pending').textContent = stats.tasks.pending;
        
        // Completed this week
        document.getElementById('stat-week').textContent = stats.tasks.weekCompleted;
        
        // Overdue
        document.getElementById('stat-overdue').textContent = stats.tasks.overdue;
        
        // Today's study time
        document.getElementById('today-time').textContent = App.formatDuration(stats.sessions.minutesToday);
        document.getElementById('today-sessions').textContent = stats.sessions.today;
        
        // Streak
        document.getElementById('streak-count').textContent = `${stats.streak} day${stats.streak !== 1 ? 's' : ''}`;
      }

      /**
       * Update weekly progress
       */
      function updateProgress() {
        const goals = Storage.getGoals();
        const stats = Storage.getStats();
        
        // Tasks progress
        const tasksProgress = document.getElementById('tasks-progress');
        const tasksPercentage = goals.weekly_tasks > 0 
          ? Math.round((goals.current_tasks / goals.weekly_tasks) * 100) 
          : 0;
        
        tasksProgress.innerHTML = App.createProgressBar(
          goals.current_tasks,
          goals.weekly_tasks,
          'Tasks Completed'
        );
        
        // Hours progress
        const hoursProgress = document.getElementById('hours-progress');
        const currentHours = Math.round(goals.current_hours * 10) / 10;
        
        hoursProgress.innerHTML = App.createProgressBar(
          currentHours,
          goals.weekly_hours,
          'Study Hours'
        );
        
        // Overall percentage
        const avgPercentage = Math.round((tasksPercentage + (goals.current_hours / goals.weekly_hours * 100)) / 2);
        document.getElementById('progress-percentage').textContent = `${Math.min(100, avgPercentage)}%`;
      }

      /**
       * Update upcoming deadlines
       */
      function updateDeadlines() {
        const deadlinesEl = document.getElementById('deadlines-list');
        const upcomingTasks = Storage.getUpcomingTasks(7);
        
        if (upcomingTasks.length === 0) {
          deadlinesEl.innerHTML = `
            <div class="empty-state" style="padding: 1rem;">
              <p class="text-secondary text-center">No upcoming deadlines in the next 7 days</p>
            </div>
          `;
          return;
        }
        
        deadlinesEl.innerHTML = upcomingTasks.slice(0, 5).map(task => {
          const subjectColor = App.getSubjectColor(task.subject);
          return `
            <div class="deadline-item">
              <span class="deadline-date">${Storage.formatDisplayDate(task.dueDate)}</span>
              <span class="deadline-title">${App.escapeHtml(task.title)}</span>
              ${App.createDeadlineBadge(task.dueDate)}
            </div>
          `;
        }).join('');
      }

      /**
       * Initialize dashboard
       */
      function init() {
        updateGreeting();
        updateDateDisplay();
        updateStats();
        updateProgress();
        updateDeadlines();
      }

      // Initialize on DOM ready
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }

      // Refresh stats every minute
      setInterval(updateStats, 60000);
    })();
  </script>
</body>
</html>
