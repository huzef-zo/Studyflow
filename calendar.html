<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <meta name="description" content="StudyFlow - Calendar View for your study schedule">
  <meta name="theme-color" content="#0B0F19" media="(prefers-color-scheme: dark)">
  <meta name="color-scheme" content="dark">
  
  <!-- Standalone PWA Configuration -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="StudyFlow">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-touch-fullscreen" content="yes">
  
  <!-- Icons and Manifest -->
  <link rel="icon" type="image/png" href="./icon-192.png">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <link rel="manifest" href="./manifest.json">
  <link rel="msapplication-config" href="browserconfig.xml">
  <meta name="msapplication-TileColor" content="#3B82F6">
  
  <title>Calendar - StudyFlow</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Calendar page - all styles now handled globally */
  </style>
</head>
<body>
  <!-- Navigation Containers -->
  <div id="sidebar-container"></div>
  <div id="bottom-nav-container"></div>

  <!-- Main Content -->
  <main class="main-container">
    <!-- Page Header -->
    <header class="page-header animate-fade-in stagger-1">
      <h1 class="glowing-text">Temporal Map</h1>
      <p class="subtitle" style="font-weight: 500;">Navigate your study timeline</p>
    </header>

    <!-- Calendar and Tasks Layout -->
    <div class="narrow-layout calendar-layout">
      
      <!-- Calendar Card -->
      <section class="calendar-container animate-fade-in stagger-2">
        <div class="flex items-center justify-between mb-lg">
          <h2 id="calendar-title" style="color: white; font-size: 1.125rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em;">March 2026</h2>
          <div class="flex gap-xs">
            <button class="btn btn-ghost btn-icon btn-sm" id="prev-month">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <button class="btn btn-secondary btn-sm" id="today-btn" style="border-radius: var(--radius-full); padding: 0 1rem;">Today</button>
            <button class="btn btn-ghost btn-icon btn-sm" id="next-month">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
          </div>
        </div>
        <div class="calendar-grid" id="calendar-grid">
          <!-- Populated by JS -->
        </div>
      </section>

      <!-- Selected Day Tasks -->
      <section class="card animate-fade-in stagger-3">
        <div class="card-header">
          <h3 class="card-title" id="selected-date-title">Target Date</h3>
          <button class="btn btn-ghost btn-icon btn-sm" id="add-task-btn" style="display: none;">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></svg>
          </button>
        </div>
        <div id="day-tasks" class="timeline">
          <!-- Populated by JS -->
        </div>
      </section>

      <!-- Legend (Pills) -->
      <section class="animate-fade-in stagger-4">
        <div class="flex flex-wrap gap-sm justify-center">
          <div class="glass-pill" style="padding: 4px 12px; font-size: 0.65rem;">
            <div style="width: 6px; height: 6px; border-radius: 50%; background: var(--primary);"></div>
            <span style="font-weight: 700; text-transform: uppercase;">Pending Mission</span>
          </div>
          <div class="glass-pill" style="padding: 4px 12px; font-size: 0.65rem;">
            <div style="width: 6px; height: 6px; border-radius: 50%; background: var(--success);"></div>
            <span style="font-weight: 700; text-transform: uppercase;">Accomplished</span>
          </div>
        </div>
      </section>
    </div>
  </main>

  <!-- Scripts -->
  <script src="js/storage.js"></script>
  <script src="js/pwa-manager.js"></script>
  <script src="js/app.js"></script>
  <script src="js/calendar.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', Calendar.init);
  </script>
</body>
</html>
